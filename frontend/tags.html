<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker — Tags</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="nav"></div>

<main class="ml-64 min-h-screen p-8">
<div class="max-w-2xl mx-auto">

    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Tags</h1>
        <p class="text-gray-500 text-sm mt-0.5">Label transactions for flexible filtering</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
        <!-- Add form -->
        <div class="p-5 border-b border-gray-100">
            <div class="flex gap-2">
                <input type="text" id="new-tag" placeholder="New tag name" maxlength="50"
                    class="flex-1 px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeydown="if(event.key==='Enter'){addTag()}">
                <button onclick="addTag()"
                    class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition-colors">
                    Add Tag
                </button>
            </div>
        </div>

        <!-- Tags list -->
        <div class="p-5">
            <div id="tags-container" class="flex flex-wrap gap-2 min-h-[60px]">
                <span class="text-gray-400 text-sm">Loading…</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="px-5 pb-4">
            <p id="tags-count" class="text-xs text-gray-400"></p>
        </div>
    </div>

</div>
</main>

<!-- Rename modal -->
<div id="rename-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
        <h3 class="font-bold text-gray-900 mb-4">Rename Tag</h3>
        <input type="text" id="rename-input"
            class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
        <div class="flex gap-3">
            <button onclick="closeRenameModal()" class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50">Cancel</button>
            <button onclick="saveRename()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700">Save</button>
        </div>
    </div>
</div>

<script src="/ui/js/api.js"></script>
<script>
    requireAuth();
    renderNav('tags');

    const COLORS = [
        'bg-blue-100 text-blue-700 border-blue-200',
        'bg-purple-100 text-purple-700 border-purple-200',
        'bg-pink-100 text-pink-700 border-pink-200',
        'bg-amber-100 text-amber-700 border-amber-200',
        'bg-teal-100 text-teal-700 border-teal-200',
        'bg-indigo-100 text-indigo-700 border-indigo-200',
        'bg-rose-100 text-rose-700 border-rose-200',
        'bg-cyan-100 text-cyan-700 border-cyan-200',
    ];

    let renameId = null;

    async function loadTags() {
        try {
            const tags = await api.get('/tags/');
            renderTags(tags || []);
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    function renderTags(tags) {
        const c = document.getElementById('tags-container');
        document.getElementById('tags-count').textContent = `${tags.length} tag${tags.length !== 1 ? 's' : ''}`;

        if (!tags.length) {
            c.innerHTML = '<span class="text-gray-400 text-sm">No tags yet. Add your first tag above.</span>';
            return;
        }

        c.innerHTML = tags.map((t, i) => {
            const color = COLORS[i % COLORS.length];
            return `
            <div class="group flex items-center gap-1 pl-3 pr-1 py-1.5 rounded-full border text-sm font-medium ${color}">
                <span class="cursor-pointer hover:opacity-75 transition-opacity" onclick="openRenameModal(${t.id}, '${t.name.replace(/'/g, "\\'")}')">${t.name}</span>
                <button onclick="deleteTag(${t.id})"
                    class="ml-1 w-5 h-5 flex items-center justify-center rounded-full hover:bg-black/10 text-xs transition-colors leading-none"
                    title="Delete">✕</button>
            </div>`;
        }).join('');
    }

    async function addTag() {
        const input = document.getElementById('new-tag');
        const name  = input.value.trim();
        if (!name) return;
        try {
            await api.post('/tags/', { name });
            input.value = '';
            showToast('Tag added');
            loadTags();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function deleteTag(id) {
        if (!confirm('Delete this tag?')) return;
        try {
            await api.delete(`/tags/${id}`);
            showToast('Tag deleted');
            loadTags();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    function openRenameModal(id, name) {
        renameId = id;
        document.getElementById('rename-input').value = name;
        document.getElementById('rename-modal').classList.remove('hidden');
        document.getElementById('rename-input').focus();
    }
    function closeRenameModal() {
        document.getElementById('rename-modal').classList.add('hidden');
        renameId = null;
    }
    async function saveRename() {
        const name = document.getElementById('rename-input').value.trim();
        if (!name || !renameId) return;
        try {
            await api.patch(`/tags/${renameId}`, { name });
            showToast('Tag renamed');
            closeRenameModal();
            loadTags();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    document.getElementById('rename-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('rename-modal')) closeRenameModal();
    });
    document.getElementById('rename-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') saveRename();
    });

    loadTags();
</script>
</body>
</html>
