<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="nav"></div>

<main class="ml-64 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                <p class="text-gray-500 text-sm mt-0.5">Monthly financial overview</p>
            </div>
            <div class="flex items-center gap-2">
                <select id="sel-month"
                    class="px-3 py-2 border border-gray-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </select>
                <input type="number" id="sel-year" min="2000" max="2100"
                    class="w-24 px-3 py-2 border border-gray-300 rounded-xl text-sm bg-white text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="loadStats()"
                    class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition-colors">
                    Load
                </button>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-3 gap-5 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm text-gray-500 font-medium">Total Income</p>
                    <span class="w-9 h-9 bg-green-100 rounded-xl flex items-center justify-center text-lg">📈</span>
                </div>
                <p id="stat-income" class="text-3xl font-bold text-green-600">—</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm text-gray-500 font-medium">Total Expense</p>
                    <span class="w-9 h-9 bg-red-100 rounded-xl flex items-center justify-center text-lg">📉</span>
                </div>
                <p id="stat-expense" class="text-3xl font-bold text-red-500">—</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-sm text-gray-500 font-medium">Balance</p>
                    <span class="w-9 h-9 bg-blue-100 rounded-xl flex items-center justify-center text-lg">💼</span>
                </div>
                <p id="stat-balance" class="text-3xl font-bold text-blue-600">—</p>
            </div>
        </div>

        <!-- Category Breakdown -->
        <div class="grid grid-cols-2 gap-5">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                    Income by Category
                </h2>
                <div id="income-cats"><p class="text-gray-400 text-sm">No data</p></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-red-500 rounded-full"></span>
                    Expense by Category
                </h2>
                <div id="expense-cats"><p class="text-gray-400 text-sm">No data</p></div>
            </div>
        </div>

        <!-- Quick links if no data -->
        <div id="empty-hint" class="hidden mt-6 bg-blue-50 border border-blue-200 rounded-2xl p-5 text-center">
            <p class="text-blue-700 font-medium mb-2">No transactions yet for this period</p>
            <p class="text-blue-500 text-sm">
                Start by adding <a href="/ui/categories.html" class="underline">categories</a>,
                then <a href="/ui/transactions.html" class="underline">transactions</a>.
            </p>
        </div>

    </div>
</main>

<script src="/ui/js/api.js"></script>
<script>
    requireAuth();
    renderNav('dashboard');

    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    const selMonth = document.getElementById('sel-month');
    const now = new Date();
    MONTHS.forEach((m, i) => {
        const o = document.createElement('option');
        o.value = i + 1;
        o.textContent = m;
        if (i === now.getMonth()) o.selected = true;
        selMonth.appendChild(o);
    });
    document.getElementById('sel-year').value = now.getFullYear();

    function renderCats(elId, cats, color) {
        const el = document.getElementById(elId);
        if (!cats.length) {
            el.innerHTML = '<p class="text-gray-400 text-sm">No data for this period</p>';
            return;
        }
        const total = cats.reduce((s, c) => s + Number(c.total), 0);
        el.innerHTML = cats.map(c => {
            const pct = total > 0 ? (Number(c.total) / total * 100).toFixed(0) : 0;
            return `
            <div class="flex items-center gap-3 py-2.5 border-b border-gray-50 last:border-0">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-800 truncate">${c.category_name || 'Uncategorized'}</p>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full rounded-full ${color}" style="width:${pct}%"></div>
                        </div>
                        <span class="text-xs text-gray-400 shrink-0">${pct}%</span>
                    </div>
                </div>
                <div class="text-right shrink-0">
                    <p class="text-sm font-bold text-gray-900">$${fmt(c.total)}</p>
                    <p class="text-xs text-gray-400">${c.count} tx</p>
                </div>
            </div>`;
        }).join('');
    }

    async function loadStats() {
        const year  = document.getElementById('sel-year').value;
        const month = document.getElementById('sel-month').value;
        try {
            const s = await api.get(`/stats/monthly?year=${year}&month=${month}`);

            document.getElementById('stat-income').textContent  = `$${fmt(s.total_income)}`;
            document.getElementById('stat-expense').textContent = `$${fmt(s.total_expense)}`;

            const bal    = Number(s.balance);
            const balEl  = document.getElementById('stat-balance');
            balEl.textContent = `$${fmt(bal)}`;
            balEl.className   = `text-3xl font-bold ${bal >= 0 ? 'text-blue-600' : 'text-red-500'}`;

            renderCats('income-cats',  s.income_by_category,  'bg-green-400');
            renderCats('expense-cats', s.expense_by_category, 'bg-red-400');

            const empty = !s.income_by_category.length && !s.expense_by_category.length;
            document.getElementById('empty-hint').classList.toggle('hidden', !empty);
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    loadStats();
</script>
</body>
</html>
