<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
            <span class="text-3xl">💰</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Finance Tracker</h1>
        <p class="text-gray-500 mt-1">Track your income and expenses</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-6">
            <button id="tab-login" onclick="switchTab('login')"
                class="flex-1 pb-3 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition-colors">
                Sign In
            </button>
            <button id="tab-register" onclick="switchTab('register')"
                class="flex-1 pb-3 text-sm font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">
                Create Account
            </button>
        </div>

        <!-- Login Form -->
        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="login-email" required placeholder="you@example.com"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <button type="submit" id="btn-login"
                    class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors mt-2">
                    Sign In
                </button>
            </div>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="reg-username" required placeholder="johndoe" minlength="3"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="reg-password" required placeholder="min 8 characters" minlength="8"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <button type="submit" id="btn-register"
                    class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors mt-2">
                    Create Account
                </button>
            </div>
        </form>

        <!-- Error -->
        <div id="error-box" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl">
            <p id="error-msg" class="text-sm text-red-600 text-center"></p>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('access_token')) window.location.href = '/ui/';

    function switchTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('form-login').classList.toggle('hidden', !isLogin);
        document.getElementById('form-register').classList.toggle('hidden', isLogin);
        const active   = 'flex-1 pb-3 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 transition-colors';
        const inactive = 'flex-1 pb-3 text-sm font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors';
        document.getElementById('tab-login').className    = isLogin  ? active : inactive;
        document.getElementById('tab-register').className = !isLogin ? active : inactive;
        hideError();
    }

    function showError(msg) {
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error-box').classList.remove('hidden');
    }
    function hideError() {
        document.getElementById('error-box').classList.add('hidden');
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.textContent = loading ? 'Please wait…' : (btnId === 'btn-login' ? 'Sign In' : 'Create Account');
    }

    async function handleLogin(e) {
        e.preventDefault();
        hideError();
        setLoading('btn-login', true);
        try {
            const email    = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const res = await fetch('/auth/login', {
                method: 'POST',




                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username: email, password }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Login failed');

            localStorage.setItem('access_token',  data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);

            const me = await fetch('/users/me', {
                headers: { 'Authorization': `Bearer ${data.access_token}` }
            }).then(r => r.json());
            localStorage.setItem('username', me.username);

            window.location.href = '/ui/';
        } catch (err) {
            showError(err.message);
        } finally {
            setLoading('btn-login', false);
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        hideError();
        setLoading('btn-register', true);
        try {
            const email    = document.getElementById('reg-email').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            const res  = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(typeof data.detail === 'string' ? data.detail : 'Registration failed');

            // auto-login
            document.getElementById('login-email').value    = email;
            document.getElementById('login-password').value = password;
            switchTab('login');
            await handleLogin({ preventDefault: () => {} });
        } catch (err) {
            showError(err.message);
        } finally {
            setLoading('btn-register', false);
        }
    }
</script>
</body>
</html>
